# /etc/nginx/sites-available/danielaadaluz.com.conf
#
# Después de copiar este archivo:
#   sudo ln -s /etc/nginx/sites-available/danielaadaluz.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS: correr `sudo certbot --nginx -d danielaadaluz.com -d www.danielaadaluz.com`
# y certbot añade el bloque SSL y la redirección automáticamente.

server {
    listen 80;
    listen [::]:80;
    server_name danielaadaluz.com www.danielaadaluz.com;

    root /var/www/danielaadaluz.com;
    index index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/css application/javascript image/svg+xml text/plain application/xml;

    # Imágenes y fuentes: cache larga (los archivos no cambian de nombre sin cambiar de contenido)
    location ~* \.(jpg|jpeg|png|webp|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # CSS / JS: cache corta para poder publicar cambios
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Seguridad básica
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
